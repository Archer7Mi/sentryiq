version: "3.8"

services:
  # PostgreSQL 16 database
  postgres:
    image: postgres:16-alpine
    container_name: sentryiq-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentryiq
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryiq_network

  # Redis 7 for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: sentryiq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryiq_network

volumes:
  postgres_data:
  redis_data:

networks:
  sentryiq_network:
    driver: bridge
